<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>World Pulse — Narrative Prediction Markets</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="header">
    <div class="header-content">
      <h1 class="logo">🌍 World Pulse</h1>
      <p class="subtitle">A dashboard of how the world is changing</p>
    </div>
    <div class="header-actions">
      <button id="search-btn" class="btn btn-primary" title="Search markets">🔍 Search</button>
      <button id="portfolio-btn" class="btn btn-secondary" title="Manage categories &amp; markets">💼 Manage</button>
    </div>
  </header>

  <main id="app">
    <section id="categories-grid" class="categories-grid"></section>
    <section id="category-detail" class="category-detail hidden"></section>
  </main>

  <!-- Search Modal -->
  <div id="search-modal" class="modal hidden">
    <div class="modal-backdrop"></div>
    <div class="modal-content">
      <div class="modal-header">
        <h2>Search Markets</h2>
        <button class="modal-close">&times;</button>
      </div>
      <div class="modal-body">
        <input type="text" id="search-input" class="search-input" placeholder="Search Kalshi markets..." autocomplete="off">
        <div id="search-results" class="search-results"></div>
      </div>
    </div>
  </div>

  <!-- Add to Category Modal (shared) -->
  <div id="add-modal" class="modal hidden">
    <div class="modal-backdrop"></div>
    <div class="modal-content modal-sm">
      <div class="modal-header">
        <h2 id="add-modal-title">Add Market</h2>
        <button class="modal-close">&times;</button>
      </div>
      <div class="modal-body" id="add-modal-body"></div>
    </div>
  </div>

  <!-- Market Detail Overlay -->
  <div id="detail-modal" class="modal hidden">
    <div class="modal-backdrop"></div>
    <div class="modal-content modal-detail">
      <div class="modal-header">
        <div style="flex:1;min-width:0;">
          <h2 class="detail-market-title" style="font-size:1rem;line-height:1.4;white-space:normal;"></h2>
          <div style="display:flex;align-items:center;gap:1rem;margin-top:0.5rem;flex-wrap:wrap;">
            <span class="detail-market-prob-display" style="font-size:2rem;font-weight:700;font-variant-numeric:tabular-nums;"></span>
            <div style="font-size:0.8125rem;color:var(--text-muted);">
              <span>Ticker: </span><span class="detail-ticker-label" style="font-family:monospace;"></span>
              <span style="margin-left:1rem;">Vol 24h: </span><span class="detail-volume-label"></span>
            </div>
          </div>
          <div id="detail-category-pills" style="display:none;flex-wrap:wrap;gap:0.375rem;margin-top:0.625rem;"></div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:0.5rem;flex-shrink:0;">
          <button class="modal-close">&times;</button>
          <button id="detail-add-btn" class="btn btn-sm btn-primary">＋ Category</button>
        </div>
      </div>
      <div class="modal-body">
        <div class="range-selector">
          <button class="range-btn" data-range="1h">1H</button>
          <button class="range-btn" data-range="1w">1W</button>
          <button class="range-btn" data-range="1m">1M</button>
          <button class="range-btn" data-range="6m">6M</button>
          <button class="range-btn" data-range="1y">1Y</button>
          <button class="range-btn" data-range="5y">5Y</button>
          <button class="range-btn active" data-range="all">ALL</button>
        </div>
        <div class="detail-chart-area">
          <canvas class="detail-chart-canvas"></canvas>
        </div>
      </div>
    </div>
  </div>

  <!-- Config / Manage Modal -->
  <div id="config-modal" class="modal hidden">
    <div class="modal-backdrop"></div>
    <div class="modal-content modal-config">
      <div class="modal-header">
        <h2>💼 Manage</h2>
        <button class="modal-close">&times;</button>
      </div>
      <div class="config-tabs">
        <button class="config-tab-btn active" data-tab="categories">Categories</button>
        <button class="config-tab-btn" data-tab="markets">Market Mappings</button>
      </div>
      <div class="modal-body" id="config-modal-body"></div>
    </div>
  </div>

  <footer class="footer">
    <p>Data from <a href="https://kalshi.com" target="_blank" rel="noopener">Kalshi</a> · Prices update every 15 min · <span id="version-display" style="color:var(--text-muted);"></span></p>
  </footer>

  <script type="module" src="js/app.js"></script>
</body>
</html>
